{{- if .Values.externalSecret.enabled }}
# Requires the External Secrets Operator (https://external-secrets.io) to be
# installed in the cluster.  The operator reconciles this resource and creates
# the Kubernetes Secret referenced by the Deployment.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vesting-backend.fullname" . }}-external-secret
  labels:
    {{- include "vesting-backend.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "vesting-backend.externalSecretTargetName" . }}
    creationPolicy: {{ .Values.externalSecret.creationPolicy }}
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- if .remoteRef.version }}
        version: {{ .remoteRef.version | quote }}
        {{- end }}
        {{- if .remoteRef.property }}
        property: {{ .remoteRef.property | quote }}
        {{- end }}
    {{- end }}
{{- end }}
